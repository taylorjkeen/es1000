const WORDS = RAW.map(([rank, word, translations, pos, mx]) => ({ rank, word, translations, pos, mx: !!mx }));

// ── palette ──────────────────────────────────────────────
const C = {
  bg: "#0F1923",
  surface: "#172330",
  surfaceHigh: "#1E2F3E",
  border: "#243546",
  green: "#006847",
  greenLight: "#00A86B",
  gold: "#C8973A",
  goldLight: "#E8B45A",
  cream: "#F5EDD6",
  muted: "#8BA0B4",
  white: "#FFFFFF",
  red: "#C0392B",
  redLight: "#E74C3C",
};

const POS_COLOR = { verb:"#5B9BD5", noun:"#50C878", adj:"#FFB347", adv:"#DA70D6", prep:"#87CEEB", conj:"#DDA0DD", pron:"#F0E68C", det:"#B8860B", art:"#A9A9A9", num:"#FFD700", interj:"#FF6B6B", other:"#808080" };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getPool(filter) {
  let pool = WORDS;
  if (filter.mx) pool = pool.filter(w => w.mx);
  if (filter.pos && filter.pos !== "all") pool = pool.filter(w => w.pos === filter.pos);
  if (filter.rankMin) pool = pool.filter(w => w.rank >= filter.rankMin);
  if (filter.rankMax) pool = pool.filter(w => w.rank <= filter.rankMax);
  return pool;
}

// ── storage helpers ───────────────────────────────────────
async function loadProgress() {
  try {
    const raw = localStorage.getItem("sp1000_progress");
    return raw ? JSON.parse(raw) : { correct: {}, incorrect: {}, seen: {} };
  } catch { return { correct: {}, incorrect: {}, seen: {} }; }
}

async function saveProgress(p) {
  try { localStorage.setItem("sp1000_progress", JSON.stringify(p)); } catch {}
}

// ── sub-components ────────────────────────────────────────

function PosTag({ pos }) {
  return (
    <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: POS_COLOR[pos] || C.muted, background: (POS_COLOR[pos] || C.muted) + "22", padding: "2px 6px", borderRadius: 4 }}>
      {pos}
    </span>
  );
}

function RankBadge({ rank }) {
  return (
    <span style={{ fontSize: 10, color: C.muted, background: C.border, padding: "2px 7px", borderRadius: 4, fontVariantNumeric: "tabular-nums" }}>
      #{rank}
    </span>
  );
}

function MxBadge() {
  return <span style={{ fontSize: 10, color: C.goldLight, background: C.gold + "22", padding: "2px 6px", borderRadius: 4, fontWeight: 700 }}>🇲🇽 MX</span>;
}

// ── FLASHCARD MODE ────────────────────────────────────────
function FlashcardMode({ filter, progress, onProgress }) {
  const pool = useRef(shuffle(getPool(filter)));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [dir, setDir] = useState("es-en"); // es-en or en-es
  const [sessionStats, setSessionStats] = useState({ correct: 0, incorrect: 0 });
  const [animKey, setAnimKey] = useState(0);

  const word = pool.current[idx % pool.current.length];
  if (!word) return <div style={{ color: C.muted, textAlign: "center", padding: 40 }}>No words match this filter.</div>;

  const front = dir === "es-en" ? word.word : word.translations[0];
  const back = dir === "es-en" ? word.translations.join(" · ") : word.word;

  function next(result) {
    const newP = { ...progress };
    if (result === "correct") {
      newP.correct = { ...newP.correct, [word.rank]: (newP.correct[word.rank] || 0) + 1 };
      setSessionStats(s => ({ ...s, correct: s.correct + 1 }));
    } else if (result === "incorrect") {
      newP.incorrect = { ...newP.incorrect, [word.rank]: (newP.incorrect[word.rank] || 0) + 1 };
      setSessionStats(s => ({ ...s, incorrect: s.incorrect + 1 }));
    }
    newP.seen = { ...newP.seen, [word.rank]: true };
    onProgress(newP);
    setFlipped(false);
    setAnimKey(k => k + 1);
    setIdx(i => i + 1);
  }

  const total = sessionStats.correct + sessionStats.incorrect;
  const accuracy = total > 0 ? Math.round((sessionStats.correct / total) * 100) : null;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16, padding: "8px 0" }}>
      {/* stats bar */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0 4px" }}>
        <span style={{ fontSize: 12, color: C.muted }}>Card {idx + 1}</span>
        <div style={{ display: "flex", gap: 12 }}>
          <span style={{ fontSize: 12, color: C.greenLight }}>✓ {sessionStats.correct}</span>
          <span style={{ fontSize: 12, color: C.redLight }}>✗ {sessionStats.incorrect}</span>
          {accuracy !== null && <span style={{ fontSize: 12, color: C.gold }}>{accuracy}%</span>}
        </div>
        <button onClick={() => setDir(d => d === "es-en" ? "en-es" : "es-en")}
          style={{ fontSize: 11, color: C.muted, background: C.border, border: "none", borderRadius: 6, padding: "3px 8px", cursor: "pointer" }}>
          {dir === "es-en" ? "ES→EN" : "EN→ES"}
        </button>
      </div>

      {/* card */}
      <div key={animKey} onClick={() => setFlipped(f => !f)}
        style={{ background: flipped ? C.surfaceHigh : C.surface, border: `1px solid ${C.border}`, borderRadius: 20, padding: "40px 24px", minHeight: 220, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16, cursor: "pointer", transition: "background 0.2s", userSelect: "none", position: "relative" }}>
        <div style={{ position: "absolute", top: 16, right: 16, display: "flex", gap: 6 }}>
          <RankBadge rank={word.rank} />
          {word.mx && <MxBadge />}
        </div>
        <div style={{ fontSize: flipped ? 20 : 42, fontWeight: 700, color: C.cream, textAlign: "center", letterSpacing: -0.5 }}>
          {flipped ? back : front}
        </div>
        {!flipped && (
          <div style={{ fontSize: 13, color: C.muted }}>tap to reveal</div>
        )}
        {flipped && (
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center" }}>
            <PosTag pos={word.pos} />
          </div>
        )}
      </div>

      {/* actions */}
      {flipped ? (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
          <button onClick={() => next("incorrect")}
            style={{ background: C.red + "22", border: `1px solid ${C.red}`, borderRadius: 14, padding: "14px 0", color: C.redLight, fontWeight: 700, fontSize: 20, cursor: "pointer" }}>✗</button>
          <button onClick={() => next("skip")}
            style={{ background: C.border, border: `1px solid ${C.border}`, borderRadius: 14, padding: "14px 0", color: C.muted, fontWeight: 700, fontSize: 16, cursor: "pointer" }}>→</button>
          <button onClick={() => next("correct")}
            style={{ background: C.green + "33", border: `1px solid ${C.greenLight}`, borderRadius: 14, padding: "14px 0", color: C.greenLight, fontWeight: 700, fontSize: 20, cursor: "pointer" }}>✓</button>
        </div>
      ) : (
        <button onClick={() => setFlipped(true)}
          style={{ background: C.green, border: "none", borderRadius: 14, padding: "16px", color: C.white, fontWeight: 700, fontSize: 16, cursor: "pointer", width: "100%" }}>
          Reveal
        </button>
      )}
    </div>
  );
}

// ── MULTIPLE CHOICE MODE ──────────────────────────────────
function buildQuestion(word, allWords, dir) {
  const correct = dir === "es-en" ? word.translations[0] : word.word;
  const prompt = dir === "es-en" ? word.word : word.translations[0];
  // distractors: same pos preferred
  const samePOS = allWords.filter(w => w.pos === word.pos && w.rank !== word.rank);
  const others = allWords.filter(w => w.rank !== word.rank);
  const pool = samePOS.length >= 3 ? samePOS : others;
  const distractors = shuffle(pool).slice(0, 3).map(w => dir === "es-en" ? w.translations[0] : w.word);
  const options = shuffle([correct, ...distractors]);
  return { prompt, correct, options, word };
}

function MultipleChoiceMode({ filter, progress, onProgress }) {
  const pool = useRef(shuffle(getPool(filter)));
  const [idx, setIdx] = useState(0);
  const [dir] = useState("es-en");
  const [question, setQuestion] = useState(null);
  const [chosen, setChosen] = useState(null);
  const [sessionStats, setSessionStats] = useState({ correct: 0, incorrect: 0 });

  useEffect(() => {
    if (pool.current.length > 0) {
      const word = pool.current[idx % pool.current.length];
      setQuestion(buildQuestion(word, WORDS, dir));
      setChosen(null);
    }
  }, [idx]);

  if (!question) return <div style={{ color: C.muted, textAlign: "center", padding: 40 }}>No words match.</div>;

  const isCorrect = chosen === question.correct;

  function pick(opt) {
    if (chosen) return;
    setChosen(opt);
    const newP = { ...progress };
    const rank = question.word.rank;
    newP.seen = { ...newP.seen, [rank]: true };
    if (opt === question.correct) {
      newP.correct = { ...newP.correct, [rank]: (newP.correct[rank] || 0) + 1 };
      setSessionStats(s => ({ ...s, correct: s.correct + 1 }));
    } else {
      newP.incorrect = { ...newP.incorrect, [rank]: (newP.incorrect[rank] || 0) + 1 };
      setSessionStats(s => ({ ...s, incorrect: s.incorrect + 1 }));
    }
    onProgress(newP);
  }

  const total = sessionStats.correct + sessionStats.incorrect;
  const accuracy = total > 0 ? Math.round((sessionStats.correct / total) * 100) : null;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16, padding: "8px 0" }}>
      <div style={{ display: "flex", justifyContent: "space-between", padding: "0 4px" }}>
        <span style={{ fontSize: 12, color: C.muted }}>Question {idx + 1}</span>
        <div style={{ display: "flex", gap: 12 }}>
          <span style={{ fontSize: 12, color: C.greenLight }}>✓ {sessionStats.correct}</span>
          <span style={{ fontSize: 12, color: C.redLight }}>✗ {sessionStats.incorrect}</span>
          {accuracy !== null && <span style={{ fontSize: 12, color: C.gold }}>{accuracy}%</span>}
        </div>
      </div>

      {/* prompt */}
      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 20, padding: "28px 24px", textAlign: "center" }}>
        <div style={{ fontSize: 13, color: C.muted, marginBottom: 8 }}>Translate:</div>
        <div style={{ fontSize: 38, fontWeight: 700, color: C.cream, marginBottom: 12 }}>{question.prompt}</div>
        <div style={{ display: "flex", gap: 6, justifyContent: "center" }}>
          <PosTag pos={question.word.pos} />
          <RankBadge rank={question.word.rank} />
          {question.word.mx && <MxBadge />}
        </div>
      </div>

      {/* options */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {question.options.map((opt, i) => {
          let bg = C.surface, border = C.border, color = C.cream;
          if (chosen) {
            if (opt === question.correct) { bg = C.green + "33"; border = C.greenLight; color = C.greenLight; }
            else if (opt === chosen && !isCorrect) { bg = C.red + "22"; border = C.redLight; color = C.redLight; }
            else { color = C.muted; }
          }
          return (
            <button key={i} onClick={() => pick(opt)}
              style={{ background: bg, border: `1px solid ${border}`, borderRadius: 14, padding: "15px 20px", color, fontWeight: chosen && opt === question.correct ? 700 : 500, fontSize: 16, cursor: chosen ? "default" : "pointer", textAlign: "left", transition: "all 0.15s" }}>
              {String.fromCharCode(65 + i)})  {opt}
            </button>
          );
        })}
      </div>

      {chosen && (
        <button onClick={() => setIdx(i => i + 1)}
          style={{ background: C.green, border: "none", borderRadius: 14, padding: 16, color: C.white, fontWeight: 700, fontSize: 16, cursor: "pointer" }}>
          Next →
        </button>
      )}
    </div>
  );
}

// ── WORD LIST MODE ────────────────────────────────────────
function WordListMode({ filter, progress }) {
  const [search, setSearch] = useState("");
  const [page, setPage] = useState(0);
  const PER_PAGE = 30;

  const base = getPool(filter);
  const filtered = search.length > 1
    ? base.filter(w => w.word.toLowerCase().includes(search.toLowerCase()) || w.translations.some(t => t.toLowerCase().includes(search.toLowerCase())))
    : base;

  const pages = Math.ceil(filtered.length / PER_PAGE);
  const shown = filtered.slice(page * PER_PAGE, (page + 1) * PER_PAGE);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <input value={search} onChange={e => { setSearch(e.target.value); setPage(0); }}
        placeholder="Search Spanish or English…"
        style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: "12px 16px", color: C.cream, fontSize: 15, outline: "none", width: "100%", boxSizing: "border-box" }} />

      <div style={{ fontSize: 12, color: C.muted, padding: "0 2px" }}>{filtered.length} words</div>

      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        {shown.map(w => {
          const seen = progress.seen?.[w.rank];
          const correct = progress.correct?.[w.rank] || 0;
          const incorrect = progress.incorrect?.[w.rank] || 0;
          const total = correct + incorrect;
          const acc = total > 0 ? Math.round((correct / total) * 100) : null;
          return (
            <div key={w.rank} style={{ background: C.surface, borderRadius: 12, padding: "12px 14px", display: "flex", alignItems: "center", gap: 12, borderLeft: `3px solid ${seen ? (acc >= 80 ? C.greenLight : acc !== null ? C.goldLight : C.muted) : C.border}` }}>
              <span style={{ fontSize: 11, color: C.muted, minWidth: 34, fontVariantNumeric: "tabular-nums" }}>#{w.rank}</span>
              <span style={{ fontSize: 17, fontWeight: 700, color: C.cream, minWidth: 90 }}>{w.word}</span>
              <span style={{ fontSize: 13, color: C.muted, flex: 1 }}>{w.translations[0]}</span>
              <PosTag pos={w.pos} />
              {w.mx && <span style={{ fontSize: 10, color: C.goldLight }}>🇲🇽</span>}
              {acc !== null && <span style={{ fontSize: 11, color: acc >= 80 ? C.greenLight : C.goldLight }}>{acc}%</span>}
            </div>
          );
        })}
      </div>

      {pages > 1 && (
        <div style={{ display: "flex", justifyContent: "center", gap: 10, padding: "8px 0" }}>
          <button onClick={() => setPage(p => Math.max(0, p - 1))} disabled={page === 0}
            style={{ background: C.border, border: "none", borderRadius: 8, padding: "8px 16px", color: page === 0 ? C.muted : C.cream, cursor: page === 0 ? "default" : "pointer" }}>‹</button>
          <span style={{ color: C.muted, fontSize: 13, padding: "8px 4px" }}>{page + 1} / {pages}</span>
          <button onClick={() => setPage(p => Math.min(pages - 1, p + 1))} disabled={page === pages - 1}
            style={{ background: C.border, border: "none", borderRadius: 8, padding: "8px 16px", color: page === pages - 1 ? C.muted : C.cream, cursor: page === pages - 1 ? "default" : "pointer" }}>›</button>
        </div>
      )}
    </div>
  );
}

// ── STATS MODE ────────────────────────────────────────────
function StatsMode({ progress }) {
  const seenCount = Object.keys(progress.seen || {}).length;
  const correctCount = Object.values(progress.correct || {}).reduce((a, b) => a + b, 0);
  const incorrectCount = Object.values(progress.incorrect || {}).reduce((a, b) => a + b, 0);
  const total = correctCount + incorrectCount;
  const accuracy = total > 0 ? Math.round((correctCount / total) * 100) : null;

  // per-POS stats
  const posStats = {};
  WORDS.forEach(w => {
    const c = progress.correct?.[w.rank] || 0;
    const i = progress.incorrect?.[w.rank] || 0;
    if (!posStats[w.pos]) posStats[w.pos] = { correct: 0, incorrect: 0 };
    posStats[w.pos].correct += c;
    posStats[w.pos].incorrect += i;
  });

  // top missed words
  const missed = WORDS.filter(w => (progress.incorrect?.[w.rank] || 0) > 0)
    .sort((a, b) => (progress.incorrect[b.rank] || 0) - (progress.incorrect[a.rank] || 0))
    .slice(0, 8);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {/* hero stats */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        {[
          { label: "Words seen", value: seenCount, color: C.cream },
          { label: "Accuracy", value: accuracy !== null ? `${accuracy}%` : "—", color: accuracy >= 80 ? C.greenLight : accuracy !== null ? C.goldLight : C.muted },
          { label: "Correct", value: correctCount, color: C.greenLight },
          { label: "Incorrect", value: incorrectCount, color: C.redLight },
        ].map(({ label, value, color }) => (
          <div key={label} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 16, padding: "18px 16px", textAlign: "center" }}>
            <div style={{ fontSize: 28, fontWeight: 800, color }}>{value}</div>
            <div style={{ fontSize: 12, color: C.muted, marginTop: 4 }}>{label}</div>
          </div>
        ))}
      </div>

      {/* pos breakdown */}
      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 16, padding: 16 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.muted, letterSpacing: 1, textTransform: "uppercase", marginBottom: 12 }}>By Part of Speech</div>
        {Object.entries(posStats).filter(([, v]) => v.correct + v.incorrect > 0).sort((a, b) => {
          const accA = a[1].correct / (a[1].correct + a[1].incorrect);
          const accB = b[1].correct / (b[1].correct + b[1].incorrect);
          return accA - accB;
        }).map(([pos, { correct, incorrect }]) => {
          const t = correct + incorrect;
          const acc = Math.round((correct / t) * 100);
          return (
            <div key={pos} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
              <PosTag pos={pos} />
              <div style={{ flex: 1, background: C.border, borderRadius: 4, height: 6, overflow: "hidden" }}>
                <div style={{ width: `${acc}%`, background: acc >= 80 ? C.greenLight : acc >= 50 ? C.goldLight : C.redLight, height: "100%", borderRadius: 4, transition: "width 0.5s" }} />
              </div>
              <span style={{ fontSize: 12, color: C.muted, minWidth: 32 }}>{acc}%</span>
            </div>
          );
        })}
        {Object.values(posStats).every(v => v.correct + v.incorrect === 0) && (
          <div style={{ color: C.muted, fontSize: 13 }}>No data yet — start practicing!</div>
        )}
      </div>

      {/* top misses */}
      {missed.length > 0 && (
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 16, padding: 16 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.muted, letterSpacing: 1, textTransform: "uppercase", marginBottom: 12 }}>Top Misses</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {missed.map(w => (
              <div key={w.rank} style={{ background: C.red + "18", border: `1px solid ${C.red}44`, borderRadius: 10, padding: "6px 12px" }}>
                <span style={{ color: C.cream, fontWeight: 700, fontSize: 14 }}>{w.word}</span>
                <span style={{ color: C.muted, fontSize: 12, marginLeft: 6 }}>{w.translations[0]}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {total === 0 && (
        <div style={{ textAlign: "center", color: C.muted, padding: 20, fontSize: 14 }}>
          Nothing yet. Go practice some words! 🇲🇽
        </div>
      )}
    </div>
  );
}

// ── FILTER PICKER ─────────────────────────────────────────
function FilterBar({ filter, onChange }) {
  const posOptions = ["all", "verb", "noun", "adj", "adv", "prep", "conj", "pron", "num", "interj"];
  return (
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap", padding: "4px 0" }}>
      <select value={filter.pos || "all"} onChange={e => onChange({ ...filter, pos: e.target.value })}
        style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: "8px 10px", color: C.cream, fontSize: 13, flex: 1, cursor: "pointer" }}>
        {posOptions.map(p => <option key={p} value={p}>{p === "all" ? "All POS" : p}</option>)}
      </select>
      <button onClick={() => onChange({ ...filter, mx: !filter.mx })}
        style={{ background: filter.mx ? C.gold + "33" : C.surface, border: `1px solid ${filter.mx ? C.goldLight : C.border}`, borderRadius: 10, padding: "8px 12px", color: filter.mx ? C.goldLight : C.muted, fontSize: 13, cursor: "pointer", whiteSpace: "nowrap" }}>
        🇲🇽 MX only
      </button>
      <button onClick={() => onChange({ pos: "all", mx: false })}
        style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: "8px 12px", color: C.muted, fontSize: 13, cursor: "pointer" }}>
        Reset
      </button>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────
const TABS = [
  { id: "flashcard", label: "Cards", icon: "🃏" },
  { id: "quiz",      label: "Quiz",  icon: "🔤" },
  { id: "list",      label: "List",  icon: "📋" },
  { id: "stats",     label: "Stats", icon: "📊" },
];

function App() {
  const [tab, setTab] = useState("flashcard");
  const [filter, setFilter] = useState({ pos: "all", mx: false });
  const [progress, setProgress] = useState({ correct: {}, incorrect: {}, seen: {} });
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    loadProgress().then(p => { setProgress(p); setLoaded(true); });
  }, []);

  const handleProgress = useCallback((p) => {
    setProgress(p);
    saveProgress(p);
  }, []);

  if (!loaded) {
    return (
      <div style={{ background: C.bg, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ color: C.muted, fontSize: 16 }}>Cargando…</div>
      </div>
    );
  }

  const seenCount = Object.keys(progress.seen || {}).length;
  const total = Object.values(progress.correct || {}).reduce((a, b) => a + b, 0) + Object.values(progress.incorrect || {}).reduce((a, b) => a + b, 0);
  const accuracy = total > 0 ? Math.round((Object.values(progress.correct || {}).reduce((a, b) => a + b, 0) / total) * 100) : null;

  return (
    <div style={{ background: C.bg, minHeight: "100vh", maxWidth: 430, margin: "0 auto", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", display: "flex", flexDirection: "column" }}>

      {/* header */}
      <div style={{ padding: "20px 20px 0", borderBottom: `1px solid ${C.border}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
          <div>
            <div style={{ fontSize: 22, fontWeight: 800, color: C.cream, letterSpacing: -0.5 }}>
              <span style={{ color: C.greenLight }}>ES</span> 1000
            </div>
            <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>RAE CREA · CORPES México</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 11, color: C.muted }}>{seenCount} / {WORDS.length} seen</div>
            {accuracy !== null && <div style={{ fontSize: 13, color: C.goldLight, fontWeight: 700 }}>{accuracy}% accuracy</div>}
          </div>
        </div>

        {/* progress bar */}
        <div style={{ background: C.border, borderRadius: 3, height: 3, marginBottom: 14, overflow: "hidden" }}>
          <div style={{ width: `${(seenCount / WORDS.length) * 100}%`, background: `linear-gradient(90deg, ${C.greenLight}, ${C.goldLight})`, height: "100%", borderRadius: 3, transition: "width 0.4s" }} />
        </div>

        {/* tab bar */}
        <div style={{ display: "flex", gap: 0 }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{ flex: 1, background: "none", border: "none", borderBottom: `2px solid ${tab === t.id ? C.greenLight : "transparent"}`, padding: "10px 4px", color: tab === t.id ? C.greenLight : C.muted, fontSize: 11, fontWeight: tab === t.id ? 700 : 400, cursor: "pointer", transition: "all 0.15s", letterSpacing: 0.5 }}>
              <div style={{ fontSize: 18, marginBottom: 2 }}>{t.icon}</div>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* filter bar (not on stats) */}
      {tab !== "stats" && (
        <div style={{ padding: "12px 20px 0" }}>
          <FilterBar filter={filter} onChange={setFilter} />
        </div>
      )}

      {/* content */}
      <div style={{ flex: 1, padding: "16px 20px 100px", overflowY: "auto" }}>
        {tab === "flashcard" && <FlashcardMode key={JSON.stringify(filter)} filter={filter} progress={progress} onProgress={handleProgress} />}
        {tab === "quiz"      && <MultipleChoiceMode key={JSON.stringify(filter)} filter={filter} progress={progress} onProgress={handleProgress} />}
        {tab === "list"      && <WordListMode filter={filter} progress={progress} />}
        {tab === "stats"     && <StatsMode progress={progress} />}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
