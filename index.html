    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

    #app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto}
    .hdr{padding:20px 20px 0;border-bottom:1px solid #243546;flex-shrink:0}
    .hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    .ttl{font-size:22px;font-weight:800;letter-spacing:-.5px}.ttl span{color:#00A86B}
    .sub{font-size:12px;color:#8BA0B4;margin-top:2px}
    .hdr-r{text-align:right;font-size:11px;color:#8BA0B4}
    .hacc{font-size:13px;color:#E8B45A;font-weight:700}
    .pbar{background:#243546;border-radius:3px;height:3px;margin-bottom:14px;overflow:hidden}
    .pfill{height:100%;background:linear-gradient(90deg,#00A86B,#E8B45A);border-radius:3px;transition:width .4s}
    .tabs{display:flex}
    .tbtn{flex:1;background:none;border:none;border-bottom:2px solid transparent;padding:10px 4px;color:#8BA0B4;font-size:11px;cursor:pointer;letter-spacing:.5px;transition:all .15s}
    .tbtn.on{color:#00A86B;border-bottom-color:#00A86B;font-weight:700}
    .tico{font-size:18px;margin-bottom:2px}
    .fbar{padding:12px 20px 0;flex-shrink:0;display:flex;gap:8px;flex-wrap:wrap}
    select{background:#172330;border:1px solid #243546;border-radius:10px;padding:8px 10px;color:#F5EDD6;font-size:13px;flex:1;cursor:pointer;-webkit-appearance:none}
    select option{background:#172330}
    .fbtn{background:#172330;border:1px solid #243546;border-radius:10px;padding:8px 12px;color:#8BA0B4;font-size:13px;cursor:pointer;white-space:nowrap}
    .fbtn.on{background:rgba(200,151,58,.2);border-color:#E8B45A;color:#E8B45A}
    .cnt{flex:1;padding:16px 20px 80px;overflow-y:auto;-webkit-overflow-scrolling:touch}

    .card.rv{background:#1E2F3E}
    .cword{font-size:42px;font-weight:700;color:#F5EDD6;text-align:center;letter-spacing:-.5px}
    .cback{font-size:20px;font-weight:700;color:#F5EDD6;text-align:center}
    .chint{font-size:13px;color:#8BA0B4}
    .cbadges{position:absolute;top:16px;right:16px;display:flex;gap:6px}
    .bdg{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:4px}
    .brank{color:#8BA0B4;background:#243546}
    .bmx{color:#E8B45A;background:rgba(200,151,58,.15)}
    .pverb{color:#5B9BD5;background:rgba(91,155,213,.15)}
    .pnoun{color:#50C878;background:rgba(80,200,120,.15)}
    .padj{color:#FFB347;background:rgba(255,179,71,.15)}
    .padv{color:#DA70D6;background:rgba(218,112,214,.15)}
    .pprep{color:#87CEEB;background:rgba(135,206,235,.15)}
    .pconj{color:#DDA0DD;background:rgba(221,160,221,.15)}
    .ppron{color:#F0E68C;background:rgba(240,230,140,.15)}
    .pdet{color:#B8860B;background:rgba(184,134,11,.15)}
    .part{color:#A9A9A9;background:rgba(169,169,169,.15)}
    .pnum{color:#FFD700;background:rgba(255,215,0,.15)}
    .pinterj{color:#FF6B6B;background:rgba(255,107,107,.15)}
    .pother{color:#808080;background:rgba(128,128,128,.15)}
    .brow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px}
    .btn{border:none;border-radius:14px;padding:14px;font-size:20px;font-weight:700;cursor:pointer;width:100%}
    .bwrong{background:rgba(192,57,43,.15);border:1px solid #C0392B;color:#E74C3C}
    .bskip{background:#243546;border:1px solid #243546;color:#8BA0B4;font-size:16px}
    .bright{background:rgba(0,104,71,.2);border:1px solid #00A86B;color:#00A86B}
    .bprim,.bnext{background:#006847;border:none;border-radius:14px;padding:16px;color:#fff;font-weight:700;font-size:16px;cursor:pointer;width:100%;margin-top:12px}

    .dbtn{font-size:11px;color:#8BA0B4;background:#243546;border:none;border-radius:6px;padding:3px 8px;cursor:pointer}

    .pword{font-size:38px;font-weight:700;color:#F5EDD6;margin-bottom:12px}
    .pbadges{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}

    .lcnt{font-size:12px;color:#8BA0B4;margin-bottom:8px}
    .li{background:#172330;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:2px;border-left:3px solid #243546}

    .lword{font-size:17px;font-weight:700;color:#F5EDD6;min-width:85px}

    .pag{display:flex;justify-content:center;gap:10px;padding:8px 0}
    .pbtn{background:#243546;border:none;border-radius:8px;padding:8px 16px;color:#F5EDD6;cursor:pointer;font-size:16px}
    .pbtn:disabled{color:#8BA0B4;cursor:default}
    .pinf{color:#8BA0B4;font-size:13px;padding:8px 4px}

    .scard{background:#172330;border:1px solid #243546;border-radius:16px;padding:18px 16px;text-align:center}

    .sttl{font-size:12px;font-weight:700;color:#8BA0B4;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
    .prow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .pbg{flex:1;background:#243546;border-radius:4px;height:6px;overflow:hidden}
    .pfb{height:100%;border-radius:4px;transition:width .5s}

",["cultural"],"adj",1],[1096,"actual",["current","present-day"],"adj",1],[1097,"natural",["natural"],"adj",1],[1098,"especial",["special"],"adj",1],[1099,"siguiente",["following","next"],"adj",1],[1100,"menor",["lesser","younger","minor","smaller"],"adj",1],[1101,"distinto",["distinct","different"],"adj",1],[1102,"reciente",["recent"],"adj",1],[1103,"aún",["still","yet","even"],"adv",1],[1104,"ahí",["there","right there"],"adv",1],[1105,"actualmente",["currently","nowadays"],"adv",1],[1106,"finalmente",["finally","in the end"],"adv",1],[1107,"principalmente",["mainly","primarily"],"adv",1],[1108,"apenas",["barely","just","hardly","as soon as"],"adv",1]];
const W=RAW.map(([r,w,t,p,m])=>({rank:r,word:w,translations:t,pos:p,mx:!!m}));
let P={correct:{},incorrect:{},seen:{}};
let F={pos:'all',mx:false};
let tab='cards';
let cPool=[],cIdx=0,cFlip=false,cDir='es-en',cSes={c:0,w:0};
let qPool=[],qIdx=0,qQ=null,qCh=null,qSes={c:0,w:0};
let lPage=0,lQ='';
const PP=30;

function lp(){try{const r=localStorage.getItem('sp1000_p');if(r)P=JSON.parse(r);}catch{}}
function sp(){try{localStorage.setItem('sp1000_p',JSON.stringify(P));}catch{}}
function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function gp(){let p=W;if(F.mx)p=p.filter(w=>w.mx);if(F.pos!=='all')p=p.filter(w=>w.pos===F.pos);return p;}
function ptag(p){return `<span class="bdg p${p}">${p}</span>`;}
function rb(r){return `<span class="bdg brank">#${r}</span>`;}
function mb(){return '<span class="bdg bmx">🇲🇽 MX</span>';}

function uh(){
  const s=Object.keys(P.seen).length;
  const c=Object.values(P.correct).reduce((a,b)=>a+b,0);
  const i=Object.values(P.incorrect).reduce((a,b)=>a+b,0);
  const t=c+i;
  document.getElementById('sc').textContent=s+' / '+W.length+' seen';
  const a=document.getElementById('ha');
  a.textContent=t>0?Math.round(c/t*100)+'% accuracy':'';
  document.getElementById('pf').style.width=(s/W.length*100)+'%';
}

function sw(t){
  tab=t;
  ['cards','quiz','list','stats'].forEach(x=>document.getElementById('t-'+x).classList.toggle('on',x===t));
  document.getElementById('fb').style.display=t==='stats'?'none':'flex';
  if(t==='cards'){ic();rc();}
  else if(t==='quiz'){iq();rq();}
  else if(t==='list'){lPage=0;lQ='';rl();}
  else rs();
}

function af(){F.pos=document.getElementById('pf2').value;if(tab==='cards'){ic();rc();}else if(tab==='quiz'){iq();rq();}else if(tab==='list'){lPage=0;rl();}}
function tmx(){F.mx=!F.mx;document.getElementById('mxb').classList.toggle('on',F.mx);af();}
function rf(){F={pos:'all',mx:false};document.getElementById('pf2').value='all';document.getElementById('mxb').classList.remove('on');af();}

// CARDS
function ic(){cPool=sh(gp());cIdx=0;cFlip=false;cSes={c:0,w:0};}
function rc(){
  const el=document.getElementById('cnt');
  if(!cPool.length){el.innerHTML='<p class="emp">No words match.</p>';return;}
  const w=cPool[cIdx%cPool.length];
  const front=cDir==='es-en'?w.word:w.translations[0];
  const back=cDir==='es-en'?w.translations.join(' · '):w.word;
  const t=cSes.c+cSes.w,acc=t>0?Math.round(cSes.c/t*100)+'%':'';
  el.innerHTML=`
    <div class="srow">
      <span class="sm">Card ${cIdx+1}</span>
      <div style="display:flex;gap:12px"><span class="sc">✓ ${cSes.c}</span><span class="sw">✗ ${cSes.w}</span>${acc?`<span class="sa">${acc}</span>`:''}</div>
      <button class="dbtn" onclick="td()">${cDir==='es-en'?'ES→EN':'EN→ES'}</button>
    </div>
    <div class="card${cFlip?' rv':''}" onclick="fc()">
      <div class="cbadges">${rb(w.rank)}${w.mx?mb():''}</div>
      <div class="${cFlip?'cback':'cword'}">${cFlip?back:front}</div>
      ${!cFlip?'<div class="chint">tap to reveal</div>':''}
      ${cFlip?`<div class="fg">${ptag(w.pos)}</div>`:''}
    </div>
    ${cFlip?`<div class="brow"><button class="btn bwrong" onclick="cn('w')">✗</button><button class="btn bskip" onclick="cn('s')">→</button><button class="btn bright" onclick="cn('r')">✓</button></div>`:`<button class="bprim" onclick="fc()">Reveal</button>`}`;
}
function fc(){cFlip=!cFlip;rc();}
function td(){cDir=cDir==='es-en'?'en-es':'es-en';cFlip=false;rc();}
function cn(r){
  const w=cPool[cIdx%cPool.length];
  P.seen[w.rank]=true;
  if(r==='r'){P.correct[w.rank]=(P.correct[w.rank]||0)+1;cSes.c++;}
  else if(r==='w'){P.incorrect[w.rank]=(P.incorrect[w.rank]||0)+1;cSes.w++;}
  sp();uh();cIdx++;cFlip=false;rc();
}

// QUIZ
function iq(){qPool=sh(gp());qIdx=0;qQ=null;qCh=null;qSes={c:0,w:0};bq();}
function bq(){
  if(!qPool.length)return;
  const w=qPool[qIdx%qPool.length];
  const cor=w.translations[0];
  const sp2=W.filter(x=>x.pos===w.pos&&x.rank!==w.rank);
  const pool=sp2.length>=3?sp2:W.filter(x=>x.rank!==w.rank);
  const dis=sh(pool).slice(0,3).map(x=>x.translations[0]);
  const opts=sh([cor,...dis]);
  qQ={word:w,correct:cor,options:opts};qCh=null;
}
function rq(){
  const el=document.getElementById('cnt');
  if(!qPool.length){el.innerHTML='<p class="emp">No words match.</p>';return;}
  const q=qQ,t=qSes.c+qSes.w,acc=t>0?Math.round(qSes.c/t*100)+'%':'';
  const opts=q.options.map((o,i)=>{
    let cls='obtn';
    if(qCh){if(o===q.correct)cls+=' cor';else if(o===qCh)cls+=' wrg';else cls+=' dim';}
    const safe=o.replace(/'/g,"\'");
    return `<button class="${cls}" ${qCh?'disabled':''} onclick="pq('${safe}')">${String.fromCharCode(65+i)})  ${o}</button>`;
  }).join('');
  el.innerHTML=`
    <div class="srow">
      <span class="sm">Q ${qIdx+1}</span>
      <div style="display:flex;gap:12px"><span class="sc">✓ ${qSes.c}</span><span class="sw">✗ ${qSes.w}</span>${acc?`<span class="sa">${acc}</span>`:''}</div>
      <span></span>
    </div>
    <div class="pcard">
      <div class="plbl">Translate:</div>
      <div class="pword">${q.word.word}</div>
      <div class="pbadges">${ptag(q.word.pos)}${rb(q.word.rank)}${q.word.mx?mb():''}</div>
    </div>
    ${opts}
    ${qCh?'<button class="bnext" onclick="nq()">Next →</button>':''}`;
}
function pq(o){
  if(qCh)return;qCh=o;
  const w=qQ.word;P.seen[w.rank]=true;
  if(o===qQ.correct){P.correct[w.rank]=(P.correct[w.rank]||0)+1;qSes.c++;}
  else{P.incorrect[w.rank]=(P.incorrect[w.rank]||0)+1;qSes.w++;}
  sp();uh();rq();
}
function nq(){qIdx++;bq();rq();}

// LIST
function rl(){
  const el=document.getElementById('cnt');
  const base=gp(),q=lQ.toLowerCase();
  const fil=q.length>1?base.filter(w=>w.word.toLowerCase().includes(q)||w.translations.some(t=>t.toLowerCase().includes(q))):base;
  const pages=Math.ceil(fil.length/PP),shown=fil.slice(lPage*PP,(lPage+1)*PP);
  const items=shown.map(w=>{
    const c=P.correct[w.rank]||0,i=P.incorrect[w.rank]||0,t=c+i,a=t>0?Math.round(c/t*100):null;
    const seen=P.seen[w.rank];
    const cls=seen?(a>=80?'li lg':a!==null?'li lo':'li lm'):'li';
    return `<div class="${cls}"><span class="lrank">#${w.rank}</span><span class="lword">${w.word}</span><span class="ltrans">${w.translations[0]}</span>${ptag(w.pos)}${w.mx?'<span style="font-size:10px;color:#E8B45A">🇲🇽</span>':''}${a!==null?`<span class="lacc ${a>=80?'g':'o'}">${a}%</span>`:''}</div>`;
  }).join('');
  const pag=pages>1?`<div class="pag"><button class="pbtn" onclick="lpn(-1)" ${lPage===0?'disabled':''}>‹</button><span class="pinf">${lPage+1} / ${pages}</span><button class="pbtn" onclick="lpn(1)" ${lPage>=pages-1?'disabled':''}>›</button></div>`:'';
  el.innerHTML=`<input class="sinp" type="search" placeholder="Search Spanish or English…" value="${lQ}" oninput="lsc(this.value)">${'<div class="lcnt">'+fil.length+' words</div>'}${items}${pag}`;
}
function lsc(v){lQ=v;lPage=0;rl();}
function lpn(d){lPage+=d;rl();}

// STATS
function rs(){
  const el=document.getElementById('cnt');
  const seen=Object.keys(P.seen).length;
  const cor=Object.values(P.correct).reduce((a,b)=>a+b,0);
  const inc=Object.values(P.incorrect).reduce((a,b)=>a+b,0);
  const tot=cor+inc,acc=tot>0?Math.round(cor/tot*100):null;
  const ps={};W.forEach(w=>{const c=P.correct[w.rank]||0,i=P.incorrect[w.rank]||0;if(!ps[w.pos])ps[w.pos]={c:0,i:0};ps[w.pos].c+=c;ps[w.pos].i+=i;});
  const pr=Object.entries(ps).filter(([,v])=>v.c+v.i>0).sort((a,b)=>(a[1].c/(a[1].c+a[1].i))-(b[1].c/(b[1].c+b[1].i))).map(([p,{c,i}])=>{
    const t=c+i,a=Math.round(c/t*100),bc=a>=80?'#00A86B':a>=50?'#E8B45A':'#E74C3C';
    return `<div class="prow">${ptag(p)}<div class="pbg"><div class="pfb" style="width:${a}%;background:${bc}"></div></div><span class="ppct">${a}%</span></div>`;
  }).join('');
  const ms=W.filter(w=>(P.incorrect[w.rank]||0)>0).sort((a,b)=>(P.incorrect[b.rank]||0)-(P.incorrect[a.rank]||0)).slice(0,8);
  const mh=ms.map(w=>`<div class="mchip"><span class="mw">${w.word}</span><span class="mt">${w.translations[0]}</span></div>`).join('');
  const ac=acc>=80?'#00A86B':acc!=null?'#E8B45A':'#8BA0B4';
  el.innerHTML=`
    <div class="sgrid">
      <div class="scard"><div class="snum">${seen}</div><div class="slbl">Words seen</div></div>
      <div class="scard"><div class="snum" style="color:${ac}">${acc!=null?acc+'%':'—'}</div><div class="slbl">Accuracy</div></div>
      <div class="scard"><div class="snum" style="color:#00A86B">${cor}</div><div class="slbl">Correct</div></div>
      <div class="scard"><div class="snum" style="color:#E74C3C">${inc}</div><div class="slbl">Incorrect</div></div>
    </div>
    ${pr?`<div class="sec"><div class="sttl">By Part of Speech</div>${pr}</div>`:''}
    ${ms.length?`<div class="sec"><div class="sttl">Top Misses</div><div class="mwrap">${mh}</div></div>`:''}
    ${tot===0?'<p class="emp">Nothing yet. Go practice! 🇲🇽</p>':''}`;
}

lp();uh();ic();rc();
</script>
